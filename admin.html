<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAGIRON — 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#06040a;--bg2:#0d0a14;--surface:#12101a;--surface2:#1a1726;
  --border:#2a2540;--border2:#3a3560;
  --gold:#c8a050;--gold2:rgba(200,160,80,.35);--gold-glow:rgba(200,160,80,.08);
  --text:#e8e0d0;--text2:#a09880;--text3:#604850;
  --danger:#e05060;--success:#50c878;--info:#5090e0;
  --rare:#88aaee;--epic:#bb88ee;--legendary:#c8a050;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;}
.auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:48px 52px;width:360px;text-align:center;box-shadow:0 0 60px rgba(200,160,80,.08);}
.auth-wordmark{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.4em;color:var(--gold);margin-bottom:8px;}
.auth-title{font-family:'Outfit',sans-serif;font-size:22px;color:var(--text);letter-spacing:.06em;margin-bottom:4px;}
.auth-sub{font-family:'Outfit',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.16em;margin-bottom:32px;}
.auth-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:10px 0;outline:none;text-align:center;letter-spacing:.2em;transition:border-color .2s;}
.auth-input:focus{border-bottom-color:var(--gold);}
.auth-btn{margin-top:24px;width:100%;padding:12px;background:transparent;border:1px solid var(--gold2);color:var(--gold);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .15s;}
.auth-btn:hover{background:var(--gold-glow);}
.auth-err{margin-top:12px;font-family:'Outfit',sans-serif;font-size:11px;color:var(--danger);min-height:16px;}
#admin{display:none;min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:rgba(6,4,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;}
.hd-left{display:flex;align-items:center;gap:16px;}
.hd-wordmark{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.4em;color:var(--gold);}
.hd-title{font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.2em;color:var(--text2);}
.hd-right{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
nav{display:flex;gap:2px;padding:16px 24px 0;border-bottom:1px solid var(--border);background:var(--bg2);}
.nav-tab{padding:10px 20px;background:transparent;border:none;color:var(--text3);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-tab:hover:not(.active){color:var(--text2);}
main{padding:32px;max-width:1100px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.sec-title{font-family:'Outfit',sans-serif;font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}
.btn{padding:9px 18px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s;}
.btn:hover{color:var(--text);}
.btn-gold{border-color:var(--gold2);color:var(--gold);}.btn-gold:hover{background:var(--gold-glow);}
.btn-danger{border-color:rgba(224,80,96,.4);color:var(--danger);}.btn-danger:hover{background:rgba(224,80,96,.08);}
.btn-sm{padding:5px 12px;font-size:10px;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:24px;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:11px 16px;text-align:left;font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.empty-row td{text-align:center;color:var(--text3);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.16em;padding:32px;}
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:.16em;text-transform:uppercase;}
.badge-common{background:rgba(100,100,100,.15);border:1px solid rgba(100,100,100,.3);color:#aaa;}
.badge-rare{background:rgba(80,120,200,.15);border:1px solid rgba(80,120,200,.3);color:var(--rare);}
.badge-epic{background:rgba(140,80,200,.15);border:1px solid rgba(140,80,200,.3);color:var(--epic);}
.badge-legendary{background:rgba(200,160,50,.15);border:1px solid rgba(200,160,50,.35);color:var(--legendary);}
.badge-active{background:rgba(80,200,120,.1);border:1px solid rgba(80,200,120,.3);color:var(--success);}
.badge-inactive{background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.2);color:var(--text3);}
#modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,4,10,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
#modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:36px 40px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;animation:modalIn .25s cubic-bezier(.34,1.3,.64,1);}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-title{font-family:'Outfit',sans-serif;font-size:15px;letter-spacing:.12em;color:var(--text);margin-bottom:28px;}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.form-row.half{flex-direction:row;gap:12px;}
.form-row.half .form-field{flex:1;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-label{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);}
.form-input,.form-select,.form-textarea{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 0;outline:none;width:100%;transition:border-color .2s;}
.form-select{cursor:pointer;}.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:72px;border:1px solid var(--border2);padding:8px;border-radius:2px;}
.form-input:focus,.form-select:focus{border-bottom-color:var(--gold);}
.form-textarea:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:28px;}
.upload-area{border:1px dashed var(--border2);border-radius:3px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;}
.upload-area:hover{border-color:var(--gold2);background:var(--gold-glow);}
.upload-area.drag{border-color:var(--gold);background:var(--gold-glow);}
.upload-label{font-family:'Outfit',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.12em;}
.upload-hint{font-family:'Outfit',sans-serif;font-size:10px;color:var(--text3);margin-top:4px;opacity:.6;}
.upload-preview{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);word-break:break-all;}
#toast{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:12px 20px;font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.1em;color:var(--text);box-shadow:0 4px 24px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{border-color:rgba(80,200,120,.4);color:var(--success);}
#toast.error{border-color:rgba(224,80,96,.4);color:var(--danger);}
.pool-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;margin-bottom:6px;}
.pool-item-name{flex:1;font-size:13px;}
.pool-weight-input{width:64px;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:4px 8px;border-radius:2px;outline:none;text-align:center;}
.pool-weight-input:focus{border-color:var(--gold);}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px 24px;}
.stat-label{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.stat-value{font-family:'Outfit',sans-serif;font-size:28px;color:var(--text);font-weight:600;}
.event-status{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.12em;}
.event-active{color:var(--success);}.event-ended{color:var(--text3);}.event-upcoming{color:var(--info);}
.loading{text-align:center;padding:48px;font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--text3);}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-wordmark">TAGIRON</div>
    <div class="auth-title">管理画面</div>
    <div class="auth-sub">ADMIN CONSOLE</div>
    <input class="auth-input" type="password" id="authPw" placeholder="パスワードを入力" autocomplete="off">
    <button class="auth-btn" onclick="doAuth()">ログイン</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>
<div id="admin">
  <header>
    <div class="hd-left">
      <div class="hd-wordmark">TAGIRON</div>
      <div class="hd-title">管理画面</div>
    </div>
    <div class="hd-right" id="hdTime"></div>
  </header>
  <nav>
    <button class="nav-tab active" onclick="switchTab('items',this)">アイテム管理</button>
    <button class="nav-tab" onclick="switchTab('events',this)">イベント管理</button>
    <button class="nav-tab" onclick="switchTab('pools',this)">排出プール</button>
    <button class="nav-tab" onclick="switchTab('stats',this)">統計</button>
  </nav>
  <main>
    <div class="panel active" id="panel-items">
      <div class="sec-header">
        <div class="sec-title">ガチャアイテム</div>
        <button class="btn btn-gold" onclick="openItemModal()">＋ アイテム追加</button>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>アイコン</th><th>ID</th><th>名前</th><th>レアリティ</th><th>種別</th><th>アセット</th><th>状態</th><th>操作</th></tr></thead>
        <tbody id="itemsTbody"><tr class="empty-row"><td colspan="8">読み込み中...</td></tr></tbody>
      </table></div>
    </div>
    <div class="panel" id="panel-events">
      <div class="sec-header">
        <div class="sec-title">イベント</div>
        <button class="btn btn-gold" onclick="openEventModal()">＋ イベント追加</button>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>名前</th><th>説明</th><th>開始</th><th>終了</th><th>状態</th><th>操作</th></tr></thead>
        <tbody id="eventsTbody"><tr class="empty-row"><td colspan="6">読み込み中...</td></tr></tbody>
      </table></div>
    </div>
    <div class="panel" id="panel-pools">
      <div class="sec-header"><div class="sec-title">排出プール設定</div></div>
      <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;">
        <div class="form-label">対象：</div>
        <select class="form-select" id="poolEventSelect" onchange="loadPool()" style="min-width:240px;padding:6px 8px;border:1px solid var(--border2);border-radius:3px;">
          <option value="">通常ガチャ（常設）</option>
        </select>
      </div>
      <div id="poolEditor"><div class="loading">読み込み中...</div></div>
    </div>
    <div class="panel" id="panel-stats">
      <div class="sec-header"><div class="sec-title">統計</div></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">総ユーザー数</div><div class="stat-value" id="statUsers">—</div></div>
        <div class="stat-card"><div class="stat-label">アイテム数</div><div class="stat-value" id="statItems">—</div></div>
        <div class="stat-card"><div class="stat-label">イベント数</div><div class="stat-value" id="statEvents">—</div></div>
      </div>
    </div>
  </main>
</div>
<div id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>
<script>
const SUPABASE_URL='https://lyykadcunkpadmiquwpd.supabase.co';
const SERVICE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5eWthZGN1bmtwYWRtaXF1d3BkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzM4ODA4MywiZXhwIjoyMDg4OTY0MDgzfQ.vO5zszTPakzh9zVH7J9c4sX38im51bL_fA0eCIfna1I';
const ADMIN_PASSWORD='Hayashida1214'; // ← 好きなパスワードに変更してください

// AUTH
function doAuth(){
  const pw=document.getElementById('authPw').value;
  if(pw===ADMIN_PASSWORD){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('admin').style.display='block';
    initAdmin();
  } else {
    document.getElementById('authErr').textContent='パスワードが違います';
  }
}
document.getElementById('authPw').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});

// SUPABASE
async function sb(path,method='GET',body=null){
  const h={'Content-Type':'application/json','apikey':SERVICE_KEY,'Authorization':'Bearer '+SERVICE_KEY,'Prefer':'return=representation'};
  const r=await fetch(SUPABASE_URL+path,{method,headers:h,body:body?JSON.stringify(body):null});
  const t=await r.text();
  try{return{ok:r.ok,status:r.status,data:t?JSON.parse(t):null};}
  catch{return{ok:r.ok,status:r.status,data:t};}
}
async function sbUpload(filePath,file){
  const r=await fetch(`${SUPABASE_URL}/storage/v1/object/gacha-assets/${filePath}`,{
    method:'POST',
    headers:{'apikey':SERVICE_KEY,'Authorization':'Bearer '+SERVICE_KEY,'Content-Type':file.type},
    body:file
  });
  if(!r.ok)return{ok:false,url:null};
  return{ok:true,url:`${SUPABASE_URL}/storage/v1/object/public/gacha-assets/${filePath}`};
}

// INIT
function initAdmin(){
  setInterval(()=>{document.getElementById('hdTime').textContent=new Date().toLocaleString('ja-JP');},1000);
  loadItems();
  loadEvents();
}

// TAB
function switchTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='pools')loadPoolEventSelect();
  if(name==='stats')loadStats();
}

// ITEMS
let _items=[];
async function loadItems(){
  const r=await sb('/rest/v1/gacha_items?select=*&order=created_at.desc');
  _items=r.data||[];
  renderItems();
}
function renderItems(){
  const tbody=document.getElementById('itemsTbody');
  if(!_items.length){tbody.innerHTML='<tr class="empty-row"><td colspan="8">アイテムがありません</td></tr>';return;}
  tbody.innerHTML=_items.map(it=>`<tr>
    <td style="font-size:20px">${it.icon||'🎁'}</td>
    <td><code style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)">${it.id}</code></td>
    <td style="color:var(--text)">${it.name}</td>
    <td><span class="badge badge-${it.rarity}">${it.rarity}</span></td>
    <td>${it.item_type}</td>
    <td>${it.asset_url?`<a href="${it.asset_url}" target="_blank" style="color:var(--info);font-size:11px">リンク</a>`:'—'}</td>
    <td><span class="badge ${it.is_active?'badge-active':'badge-inactive'}">${it.is_active?'有効':'無効'}</span></td>
    <td style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="openItemModal('${it.id}')">編集</button>
      <button class="btn btn-sm btn-danger" onclick="deleteItem('${it.id}')">削除</button>
    </td>
  </tr>`).join('');
}

let _uploadFile=null;
function openItemModal(id=null){
  const it=id?_items.find(i=>i.id===id):null;
  _uploadFile=null;
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-title">${it?'アイテム編集':'アイテム追加'}</div>
    <div class="form-row half">
      <div class="form-field"><div class="form-label">ID（英数字・_）</div>
        <input class="form-input" id="fId" value="${it?.id||''}" placeholder="tile_fire" ${it?'readonly':''}></div>
      <div class="form-field"><div class="form-label">アイコン絵文字</div>
        <input class="form-input" id="fIcon" value="${it?.icon||'🎁'}"></div>
    </div>
    <div class="form-row"><div class="form-label">名前</div>
      <input class="form-input" id="fName" value="${it?.name||''}" placeholder="炎タイル"></div>
    <div class="form-row"><div class="form-label">説明</div>
      <textarea class="form-textarea" id="fDesc" placeholder="アイテムの説明">${it?.description||''}</textarea></div>
    <div class="form-row half">
      <div class="form-field"><div class="form-label">レアリティ</div>
        <select class="form-select" id="fRarity">
          ${['common','rare','epic','legendary'].map(r=>`<option value="${r}" ${it?.rarity===r?'selected':''}>${r}</option>`).join('')}
        </select></div>
      <div class="form-field"><div class="form-label">種別</div>
        <input class="form-input" id="fType" value="${it?.item_type||''}" placeholder="bgm / ui_theme / tile"></div>
    </div>
    <div class="form-row"><div class="form-label">アセットファイル（JPG・MP3・CSS など）</div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <div class="upload-label">クリックまたはドラッグ＆ドロップ</div>
        <div class="upload-hint">JPG・PNG・MP3・CSS・その他すべての拡張子対応</div>
        <div class="upload-preview" id="uploadPreview">${it?.asset_url?'現在: '+it.asset_url.split('/').pop():''}</div>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(this)">
    </div>
    <div class="form-row"><div class="form-label">または直接URLを入力</div>
      <input class="form-input" id="fAssetUrl" value="${it?.asset_url||''}" placeholder="https://..."></div>
    <div class="form-row half">
      <div class="form-field"><div class="form-label">状態</div>
        <select class="form-select" id="fActive">
          <option value="true" ${it?.is_active!==false?'selected':''}>有効</option>
          <option value="false" ${it?.is_active===false?'selected':''}>無効</option>
        </select></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-gold" onclick="saveItem('${id||''}')">保存</button>
    </div>`;
  showModal();
}
function handleFileSelect(inp){if(inp.files[0])setFile(inp.files[0]);}
function handleDrop(e){e.preventDefault();document.getElementById('uploadArea').classList.remove('drag');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);}
function setFile(f){_uploadFile=f;document.getElementById('uploadPreview').textContent='📎 '+f.name+' ('+Math.round(f.size/1024)+'KB)';}
async function saveItem(id){
  const fId=document.getElementById('fId').value.trim();
  const fName=document.getElementById('fName').value.trim();
  const fIcon=document.getElementById('fIcon').value.trim();
  const fDesc=document.getElementById('fDesc').value.trim();
  const fRarity=document.getElementById('fRarity').value;
  const fType=document.getElementById('fType').value.trim();
  const fActive=document.getElementById('fActive').value==='true';
  let assetUrl=document.getElementById('fAssetUrl').value.trim();
  if(!fId||!fName||!fType){showToast('IDと名前と種別は必須です','error');return;}
  if(_uploadFile){
    showToast('アップロード中...','');
    const ext=_uploadFile.name.split('.').pop();
    const up=await sbUpload(`${fType}/${fId}_${Date.now()}.${ext}`,_uploadFile);
    if(!up.ok){showToast('アップロード失敗','error');return;}
    assetUrl=up.url;
    document.getElementById('fAssetUrl').value=assetUrl;
  }
  const payload={id:fId,name:fName,icon:fIcon,description:fDesc||null,rarity:fRarity,item_type:fType,asset_url:assetUrl||null,is_active:fActive};
  const r=id?await sb(`/rest/v1/gacha_items?id=eq.${id}`,'PATCH',payload):await sb('/rest/v1/gacha_items','POST',payload);
  if(!r.ok){showToast('保存失敗: '+JSON.stringify(r.data),'error');return;}
  showToast('保存しました','success');closeModal();loadItems();
}
async function deleteItem(id){
  if(!confirm(`「${id}」を削除しますか？`))return;
  const r=await sb(`/rest/v1/gacha_items?id=eq.${id}`,'DELETE');
  if(!r.ok){showToast('削除失敗','error');return;}
  showToast('削除しました','success');loadItems();
}

// EVENTS
let _events=[];
async function loadEvents(){
  const r=await sb('/rest/v1/gacha_events?select=*&order=starts_at.desc');
  _events=r.data||[];
  renderEvents();
}
function fmtDate(s){return new Date(s).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function eventStatus(ev){
  const now=new Date(),s=new Date(ev.starts_at),e=new Date(ev.ends_at);
  if(!ev.is_active)return '<span class="event-status event-ended">無効</span>';
  if(now<s)return '<span class="event-status event-upcoming">開催予定</span>';
  if(now>e)return '<span class="event-status event-ended">終了</span>';
  return '<span class="event-status event-active">● 開催中</span>';
}
function renderEvents(){
  const tbody=document.getElementById('eventsTbody');
  if(!_events.length){tbody.innerHTML='<tr class="empty-row"><td colspan="6">イベントがありません</td></tr>';return;}
  tbody.innerHTML=_events.map(ev=>`<tr>
    <td style="color:var(--text)">${ev.name}</td>
    <td style="font-size:12px">${ev.description||'—'}</td>
    <td style="font-size:12px">${fmtDate(ev.starts_at)}</td>
    <td style="font-size:12px">${fmtDate(ev.ends_at)}</td>
    <td>${eventStatus(ev)}</td>
    <td style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="openEventModal('${ev.id}')">編集</button>
      <button class="btn btn-sm btn-danger" onclick="deleteEvent('${ev.id}')">削除</button>
    </td>
  </tr>`).join('');
}
function toLocalInput(s){if(!s)return'';const d=new Date(s),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}
function openEventModal(id=null){
  const ev=id?_events.find(e=>e.id===id):null;
  document.getElementById('modal-box').innerHTML=`
    <div class="modal-title">${ev?'イベント編集':'イベント追加'}</div>
    <div class="form-row"><div class="form-label">イベント名</div>
      <input class="form-input" id="evName" value="${ev?.name||''}" placeholder="夏祭りガチャ"></div>
    <div class="form-row"><div class="form-label">説明</div>
      <textarea class="form-textarea" id="evDesc" placeholder="イベントの説明">${ev?.description||''}</textarea></div>
    <div class="form-row half">
      <div class="form-field"><div class="form-label">開始日時</div>
        <input class="form-input" type="datetime-local" id="evStart" value="${toLocalInput(ev?.starts_at)}"></div>
      <div class="form-field"><div class="form-label">終了日時</div>
        <input class="form-input" type="datetime-local" id="evEnd" value="${toLocalInput(ev?.ends_at)}"></div>
    </div>
    <div class="form-row"><div class="form-label">状態</div>
      <select class="form-select" id="evActive">
        <option value="true" ${ev?.is_active!==false?'selected':''}>有効</option>
        <option value="false" ${ev?.is_active===false?'selected':''}>無効</option>
      </select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-gold" onclick="saveEvent('${id||''}')">保存</button>
    </div>`;
  showModal();
}
async function saveEvent(id){
  const name=document.getElementById('evName').value.trim();
  const desc=document.getElementById('evDesc').value.trim();
  const start=document.getElementById('evStart').value;
  const end=document.getElementById('evEnd').value;
  const active=document.getElementById('evActive').value==='true';
  if(!name||!start||!end){showToast('名前・開始・終了は必須です','error');return;}
  const payload={name,description:desc||null,starts_at:new Date(start).toISOString(),ends_at:new Date(end).toISOString(),is_active:active};
  const r=id?await sb(`/rest/v1/gacha_events?id=eq.${id}`,'PATCH',payload):await sb('/rest/v1/gacha_events','POST',payload);
  if(!r.ok){showToast('保存失敗: '+JSON.stringify(r.data),'error');return;}
  showToast('保存しました','success');closeModal();loadEvents();
}
async function deleteEvent(id){
  if(!confirm('このイベントを削除しますか？排出プールも削除されます。'))return;
  const r=await sb(`/rest/v1/gacha_events?id=eq.${id}`,'DELETE');
  if(!r.ok){showToast('削除失敗','error');return;}
  showToast('削除しました','success');loadEvents();
}

// POOLS
async function loadPoolEventSelect(){
  await loadEvents();
  const sel=document.getElementById('poolEventSelect');
  sel.innerHTML='<option value="">通常ガチャ（常設）</option>';
  _events.forEach(ev=>{
    const o=document.createElement('option');
    o.value=ev.id;o.textContent=ev.name+' （'+fmtDate(ev.starts_at)+'〜'+fmtDate(ev.ends_at)+'）';
    sel.appendChild(o);
  });
  loadPool();
}
async function loadPool(){
  await loadItems();
  const eventId=document.getElementById('poolEventSelect').value;
  const q=eventId?`/rest/v1/gacha_pools?event_id=eq.${eventId}&select=*`:`/rest/v1/gacha_pools?event_id=is.null&select=*`;
  const r=await sb(q);
  const pool=r.data||[];
  const poolMap={};pool.forEach(p=>{poolMap[p.item_id]=p;});
  const editor=document.getElementById('poolEditor');
  if(!_items.length){editor.innerHTML='<div class="loading">アイテムを先に作成してください</div>';return;}
  editor.innerHTML=`
    <div style="margin-bottom:16px;font-family:Outfit,sans-serif;font-size:11px;color:var(--text3);letter-spacing:.14em;">
      重みが大きいほど排出されやすくなります。0にするとプールから除外されます。
    </div>
    ${_items.filter(it=>it.is_active).map(it=>`
      <div class="pool-item">
        <span style="font-size:18px">${it.icon||'🎁'}</span>
        <span class="pool-item-name">${it.name} <span class="badge badge-${it.rarity}">${it.rarity}</span></span>
        <span style="font-family:Outfit,sans-serif;font-size:10px;color:var(--text3);margin-right:4px;">重み</span>
        <input class="pool-weight-input" type="number" min="0" max="9999" data-item-id="${it.id}" value="${poolMap[it.id]?.weight??0}">
      </div>`).join('')}
    <div style="margin-top:16px;display:flex;justify-content:flex-end;">
      <button class="btn btn-gold" onclick="savePool()">プールを保存</button>
    </div>`;
}
async function savePool(){
  const eventId=document.getElementById('poolEventSelect').value;
  const inputs=document.querySelectorAll('.pool-weight-input');
  const toAdd=[];
  inputs.forEach(inp=>{
    const w=parseInt(inp.value)||0;
    if(w>0)toAdd.push({event_id:eventId||null,item_id:inp.dataset.itemId,weight:w});
  });
  const delQ=eventId?`/rest/v1/gacha_pools?event_id=eq.${eventId}`:`/rest/v1/gacha_pools?event_id=is.null`;
  await sb(delQ,'DELETE');
  if(toAdd.length>0){
    const r=await sb('/rest/v1/gacha_pools','POST',toAdd);
    if(!r.ok){showToast('保存失敗: '+JSON.stringify(r.data),'error');return;}
  }
  showToast(`保存しました（${toAdd.length}アイテム）`,'success');
}

// STATS
async function loadStats(){
  const [itemsR,eventsR]=await Promise.all([
    sb('/rest/v1/gacha_items?select=id'),
    sb('/rest/v1/gacha_events?select=id'),
  ]);
  const uRes=await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=id`,{
    headers:{'apikey':SERVICE_KEY,'Authorization':'Bearer '+SERVICE_KEY,'Prefer':'count=exact','Range':'0-0'}
  });
  const cr=uRes.headers.get('content-range');
  document.getElementById('statUsers').textContent=cr?cr.split('/')[1]:'?';
  document.getElementById('statItems').textContent=(itemsR.data||[]).length;
  document.getElementById('statEvents').textContent=(eventsR.data||[]).length;
}

// MODAL
function showModal(){document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function closeModalOverlay(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// TOAST
let _tt=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  clearTimeout(_tt);_tt=setTimeout(()=>{t.className='';},2800);
}
</script>
