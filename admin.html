<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TAGIRON 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0b08;--surface:#16120e;--surface2:#1e1810;
  --border:#2e2618;--border2:#3e3420;--border3:#5a4a2a;
  --text:#f0e8d8;--text2:#a89878;--text3:#6a5c40;
  --gold:#c8a050;--gold2:#8a6828;--gold-glow:rgba(200,160,80,.15);
  --danger:#c04030;--success:#4a8a3a;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
#app{max-width:1100px;margin:0 auto;padding:0 20px 80px;}
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:32px;}
.wordmark{font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:.28em;background:linear-gradient(135deg,#e8d090,#c8a050,#a07030);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.admin-badge{font-family:'Outfit',sans-serif;font-size:10px;color:var(--danger);letter-spacing:.2em;border:1px solid var(--danger);padding:2px 8px;border-radius:2px;opacity:.7;}
.header-right{display:flex;align-items:center;gap:12px;}
.admin-user{font-family:'Outfit',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.08em;}
#loginView{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:40px 44px;width:360px;position:relative;}
.login-box::before{content:'';position:absolute;top:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.login-title{font-family:'Outfit',sans-serif;font-size:18px;color:var(--text);margin-bottom:4px;}
.login-sub{font-family:'Outfit',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field-label{font-family:'Outfit',sans-serif;font-size:10px;color:var(--text2);letter-spacing:.18em;text-transform:uppercase;}
.input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 0;outline:none;width:100%;transition:border-color .2s;}
.input:focus{border-bottom-color:var(--gold);}
.input::placeholder{color:var(--text3);}
.err{font-family:'Outfit',sans-serif;font-size:11px;color:var(--danger);min-height:16px;margin-bottom:8px;}
.btn{width:100%;padding:11px;background:transparent;border:1px solid var(--gold2);color:var(--gold);font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .15s;}
.btn:hover{background:var(--gold-glow);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-danger{border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:rgba(192,64,48,.1);}
.btn-sm{width:auto;padding:6px 14px;font-size:11px;}
.btn-secondary{border-color:var(--border2);color:var(--text2);}
.btn-secondary:hover{border-color:var(--border3);background:rgba(255,255,255,.03);}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;gap:0;}
.nav-tab{background:transparent;border:none;color:var(--text3);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold2);}
.nav-tab:hover:not(.active){color:var(--text2);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.section-title{font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);letter-spacing:.06em;}
.section-sub{font-family:'Outfit',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.14em;margin-top:2px;}
.tbl-wrap{overflow-x:auto;margin-bottom:24px;}
table{width:100%;border-collapse:collapse;}
th{font-family:'Outfit',sans-serif;font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.015);}
.tag{display:inline-block;padding:2px 8px;border-radius:2px;font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
.tag-common{background:rgba(100,100,100,.15);border:1px solid rgba(100,100,100,.3);color:#aaa;}
.tag-rare{background:rgba(80,120,200,.15);border:1px solid rgba(80,120,200,.3);color:#88aaee;}
.tag-epic{background:rgba(140,80,200,.15);border:1px solid rgba(140,80,200,.3);color:#bb88ee;}
.tag-legendary{background:rgba(200,160,50,.15);border:1px solid rgba(200,160,50,.35);color:var(--gold);}
.tag-active{background:rgba(74,138,58,.15);border:1px solid rgba(74,138,58,.3);color:#7aba7a;}
.tag-inactive{background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.2);color:var(--text3);}
.tag-event{background:rgba(200,80,80,.15);border:1px solid rgba(200,80,80,.3);color:#e88;}
.tag-standard{background:rgba(80,120,200,.1);border:1px solid rgba(80,120,200,.2);color:#88aaee;}
.act-btns{display:flex;gap:6px;flex-wrap:wrap;}
.icon-cell{font-size:20px;text-align:center;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(6,4,1,.88);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:32px 36px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;position:relative;animation:mIn .22s cubic-bezier(.34,1.3,.64,1);}
.modal::before{content:'';position:absolute;top:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:'Outfit',sans-serif;font-size:15px;color:var(--gold);letter-spacing:.08em;margin-bottom:22px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;}
.form-grid .full{grid-column:1/-1;}
.form-actions{display:flex;gap:8px;margin-top:22px;}
.form-actions .btn{flex:1;}
select.input{cursor:pointer;}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.toggle{width:36px;height:20px;background:var(--border2);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--success);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle.on::after{transform:translateX(16px);}
.toggle-label{font-size:13px;color:var(--text2);}
.pool-items-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.weight-input{width:70px;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:4px 8px;border-radius:2px;text-align:center;}
.weight-input:focus{outline:none;border-color:var(--gold2);}
.toast{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:3px;padding:12px 18px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--text);letter-spacing:.06em;box-shadow:0 4px 20px rgba(0,0,0,.6);animation:tIn .25s ease;pointer-events:none;}
.toast.success{border-color:rgba(74,138,58,.5);color:#7aba7a;}
.toast.error{border-color:rgba(192,64,48,.5);color:var(--danger);}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty{text-align:center;padding:40px;font-family:'Outfit',sans-serif;font-size:12px;color:var(--text3);letter-spacing:.1em;}
.spinner{width:18px;height:18px;border:1.5px solid var(--border2);border-top-color:var(--gold2);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:32px;font-family:'Outfit',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.12em;}
</style>
</head>
<body>
<div id="app">
<div id="loginView">
  <div class="login-box">
    <h1 class="login-title">ADMIN</h1>
    <p class="login-sub">管理画面へのログイン</p>
    <div class="field">
      <label class="field-label">メールアドレス</label>
      <input id="emailInput" class="input" type="email" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label class="field-label">パスワード</label>
      <input id="passwordInput" class="input" type="password" placeholder="••••••••">
    </div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="handleLogin()">ログイン</button>
  </div>
</div>
<div id="adminView" style="display:none;">
  <header>
    <div class="wordmark">TAGIRON</div>
    <div class="header-right">
      <span class="admin-badge">ADMIN</span>
      <span class="admin-user" id="adminUser">admin</span>
      <button class="btn btn-secondary btn-sm" onclick="handleLogout()">ログアウト</button>
    </div>
  </header>
  <div class="nav-tabs" id="navTabs"></div>
  <div id="tabsContainer"></div>
</div>
</div>

<div class="modal-bg" id="itemModal">
  <div class="modal">
    <h2 class="modal-title" id="itemModalTitle">アイテムを追加</h2>
    <div class="form-grid">
      <input class="input full" id="itemId" placeholder="アイテムID" style="grid-column:1/-1;margin-bottom:12px;border-bottom-width:2px;">
      <input class="input" id="itemName" placeholder="アイテム名">
      <input class="input" id="itemIcon" placeholder="🎁" maxlength="2">
      <select class="input" id="itemRarity" style="grid-column:1/-1;">
        <option value="common">Common</option>
        <option value="rare">Rare</option>
        <option value="epic">Epic</option>
        <option value="legendary">Legendary</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeItemModal()">キャンセル</button>
      <button class="btn" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="poolModal">
  <div class="modal">
    <h2 class="modal-title" id="poolModalTitle">プールを追加</h2>
    <div class="form-grid">
      <input class="input full" id="poolId" placeholder="プールID" style="grid-column:1/-1;margin-bottom:12px;border-bottom-width:2px;">
      <input class="input full" id="poolName" placeholder="プール名" style="grid-column:1/-1;">
      <div class="toggle-row full">
        <div class="toggle" id="eventToggle" onclick="toggleEventFlag()"></div>
        <span class="toggle-label">イベントプール</span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closePoolModal()">キャンセル</button>
      <button class="btn" onclick="savePool()">保存</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://lyykadcunkpadmiquwpd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5eWthZGN1bmtwYWRtaXF1d3BkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODgwODMsImV4cCI6MjA4ODk2NDA4M30.6bX8CZHgTvV47K_abpAbGooL_jNFQVzaaTTL8yNsiNM';
const RARITY_LABELS={common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary'};

let _adminToken=null;
let _adminEmail=null;
let _adminName=null;
let _tabs=[
  {id:'items',label:'アイテム'},
  {id:'pools',label:'プール'},
  {id:'pool-items',label:'プール設定'}
];
let _allItems=[];
let _allPools=[];
let _editingItemId=null;
let _editingPoolId=null;

async function handleLogin(){
  const email=document.getElementById('emailInput').value.trim();
  const password=document.getElementById('passwordInput').value;
  const errDiv=document.getElementById('loginErr');
  
  if(!email||!password){
    errDiv.textContent='メールアドレスとパスワードを入力してください';
    return;
  }
  
  errDiv.textContent='';
  
  try{
    const r=await fetch(`${SUPABASE_URL}/rpc/admin_login`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
      body:JSON.stringify({p_email:email,p_password:password})
    });
    
    if(!r.ok){
      errDiv.textContent='ログインリクエストに失敗しました';
      return;
    }
    
    const data=await r.json();
    if(!data.length||!data[0].success){
      errDiv.textContent=data.length?data[0].message:'ログインに失敗しました';
      return;
    }
    
    const result=data[0];
    _adminToken=result.token;
    _adminEmail=result.admin_email;
    _adminName=result.admin_name;
    
    localStorage.setItem('admin_token',_adminToken);
    localStorage.setItem('admin_email',_adminEmail);
    localStorage.setItem('admin_name',_adminName);
    
    showAdminApp();
  }catch(err){
    console.error('Login error:',err);
    errDiv.textContent='ネットワークエラーが発生しました';
  }
}

async function _tryRestoreAdminSession(){
  const token=localStorage.getItem('admin_token');
  const email=localStorage.getItem('admin_email');
  const name=localStorage.getItem('admin_name');
  
  if(!token||!email) return false;
  
  _adminToken=token;
  _adminEmail=email;
  _adminName=name;
  return true;
}

function handleLogout(){
  _adminToken=null;
  _adminEmail=null;
  _adminName=null;
  localStorage.removeItem('admin_token');
  localStorage.removeItem('admin_email');
  localStorage.removeItem('admin_name');
  document.getElementById('loginView').style.display='flex';
  document.getElementById('adminView').style.display='none';
  document.getElementById('emailInput').value='';
  document.getElementById('passwordInput').value='';
}

async function sbFetch(path,method='GET',body=null){
  const opts={
    method,
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${SUPABASE_KEY}`
    }
  };
  if(body) opts.body=JSON.stringify(body);
  return fetch(`${SUPABASE_URL}${path}`,opts);
}

function showAdminApp(){
  document.getElementById('loginView').style.display='none';
  document.getElementById('adminView').style.display='block';
  document.getElementById('adminUser').textContent=_adminName||_adminEmail;
  renderNavTabs();
  selectTab('items');
}

function renderNavTabs(){
  const navTabs=document.getElementById('navTabs');
  navTabs.innerHTML='';
  _tabs.forEach(tab=>{
    const btn=document.createElement('button');
    btn.className='nav-tab';
    btn.textContent=tab.label;
    btn.onclick=()=>selectTab(tab.id);
    navTabs.appendChild(btn);
  });
}

function selectTab(tabId){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active',_tabs[i].id===tabId);
  });
  const container=document.getElementById('tabsContainer');
  container.innerHTML='';
  
  if(tabId==='items'){
    container.innerHTML=`<div class="tab-content active"><div class="section-header"><div><div class="section-title">アイテム管理</div><div class="section-sub">ガチャで排出されるアイテムを管理します</div></div><button class="btn btn-sm" onclick="openItemModal()">追加</button></div><div class="tbl-wrap"><div id="itemsTable"></div></div></div>`;
    loadItems();
  } else if(tabId==='pools'){
    container.innerHTML=`<div class="tab-content active"><div class="section-header"><div><div class="section-title">プール管理</div><div class="section-sub">ガチャプール（抽選グループ）を管理します</div></div><button class="btn btn-sm" onclick="openPoolModal()">追加</button></div><div class="tbl-wrap"><div id="poolsTable"></div></div></div>`;
    loadPools();
  } else if(tabId==='pool-items'){
    container.innerHTML=`<div class="tab-content active"><div class="section-header"><div><div class="section-title">プール内のアイテム設定</div><div class="section-sub">各プールにアイテムを紐付けて、排出確率を設定します</div></div></div><div class="field" style="max-width:400px;margin-bottom:20px;"><label class="field-label">プールを選択</label><select class="input" id="poolSelect" onchange="loadPoolItems()"><option value="">— プールを選択 —</option></select></div><div id="poolItemsArea"></div></div>`;
    loadPools().then(()=>updatePoolSelect());
  }
}

async function loadItems(){
  const tbl=document.getElementById('itemsTable');
  tbl.innerHTML='<div class="loading"><span class="spinner"></span>読み込み中…</div>';
  const r=await sbFetch('/rest/v1/gacha_items?select=*');
  if(!r.ok){tbl.innerHTML='<div class="empty">読み込みに失敗しました</div>';return;}
  _allItems=(await r.json())||[];
  renderItems();
}

function renderItems(){
  const tbl=document.getElementById('itemsTable');
  if(!_allItems.length){tbl.innerHTML='<div class="empty">アイテムが登録されていません</div>';return;}
  let html='<table><thead><tr><th>アイコン</th><th>アイテムID</th><th>名前</th><th>レアリティ</th><th>操作</th></tr></thead><tbody>';
  _allItems.forEach(it=>{html+=`<tr><td class="icon-cell">${it.icon||'🎁'}</td><td><code style="font-size:11px;color:var(--text3)">${it.id}</code></td><td>${it.name}</td><td><span class="tag tag-${it.rarity}">${RARITY_LABELS[it.rarity]}</span></td><td><div class="act-btns"><button class="btn btn-sm" onclick="editItem('${it.id}')">編集</button><button class="btn btn-sm btn-danger" onclick="deleteItem('${it.id}')">削除</button></div></td></tr>`;});
  html+='</tbody></table>';
  tbl.innerHTML=html;
}

function openItemModal(itemId=null){
  _editingItemId=itemId;
  const modal=document.getElementById('itemModal');
  const title=document.getElementById('itemModalTitle');
  if(itemId){
    const item=_allItems.find(x=>x.id===itemId);
    title.textContent='アイテムを編集';
    document.getElementById('itemId').value=item.id;document.getElementById('itemName').value=item.name;document.getElementById('itemIcon').value=item.icon;document.getElementById('itemRarity').value=item.rarity;document.getElementById('itemId').disabled=true;
  }else{
    title.textContent='アイテムを追加';
    document.getElementById('itemId').value='';document.getElementById('itemName').value='';document.getElementById('itemIcon').value='';document.getElementById('itemRarity').value='common';document.getElementById('itemId').disabled=false;
  }
  modal.classList.add('show');
}

function closeItemModal(){document.getElementById('itemModal').classList.remove('show');}

async function saveItem(){
  const id=document.getElementById('itemId').value.trim();const name=document.getElementById('itemName').value.trim();const icon=document.getElementById('itemIcon').value.trim();const rarity=document.getElementById('itemRarity').value;
  if(!id||!name){showToast('アイテムIDと名前は必須です','error');return;}
  const itemData={id,name,icon,rarity};
  let r;
  if(_editingItemId){r=await sbFetch(`/rest/v1/gacha_items?id=eq.${_editingItemId}`,'PATCH',itemData);}else{r=await sbFetch('/rest/v1/gacha_items','POST',itemData);}
  if(!r.ok){showToast(_editingItemId?'更新に失敗しました':'追加に失敗しました','error');return;}
  showToast(_editingItemId?'アイテムを更新しました':'アイテムを追加しました','success');closeItemModal();loadItems();
}

async function deleteItem(id){if(!confirm(`「${id}」を削除しますか？`)) return;const r=await sbFetch(`/rest/v1/gacha_items?id=eq.${id}`,'DELETE');if(!r.ok){showToast('削除に失敗しました','error');return;}showToast('削除しました','success');loadItems();}

function editItem(id){openItemModal(id);}

async function loadPools(){
  const r=await sbFetch('/rest/v1/gacha_pools?select=*');
  if(!r.ok) return;
  _allPools=(await r.json())||[];
  renderPools();
}

function renderPools(){
  const tbl=document.getElementById('poolsTable');
  if(!_allPools.length){tbl.innerHTML='<div class="empty">プールが登録されていません</div>';return;}
  let html='<table><thead><tr><th>プールID</th><th>名前</th><th>タイプ</th><th>操作</th></tr></thead><tbody>';
  _allPools.forEach(p=>{html+=`<tr><td><code style="font-size:11px;color:var(--text3)">${p.id}</code></td><td>${p.name}</td><td><span class="tag ${p.is_event?'tag-event':'tag-standard'}">${p.is_event?'イベント':'通常'}</span></td><td><div class="act-btns"><button class="btn btn-sm" onclick="editPool('${p.id}')">編集</button><button class="btn btn-sm btn-danger" onclick="deletePool('${p.id}')">削除</button></div></td></tr>`;});
  html+='</tbody></table>';
  tbl.innerHTML=html;
}

function openPoolModal(poolId=null){
  _editingPoolId=poolId;
  const modal=document.getElementById('poolModal');
  const title=document.getElementById('poolModalTitle');
  if(poolId){
    const pool=_allPools.find(x=>x.id===poolId);
    title.textContent='プールを編集';
    document.getElementById('poolId').value=pool.id;document.getElementById('poolName').value=pool.name;document.getElementById('eventToggle').classList.toggle('on',pool.is_event);document.getElementById('poolId').disabled=true;
  }else{
    title.textContent='プールを追加';
    document.getElementById('poolId').value='';document.getElementById('poolName').value='';document.getElementById('eventToggle').classList.remove('on');document.getElementById('poolId').disabled=false;
  }
  modal.classList.add('show');
}

function closePoolModal(){document.getElementById('poolModal').classList.remove('show');}

function toggleEventFlag(){document.getElementById('eventToggle').classList.toggle('on');}

function editPool(id){openPoolModal(id);}

async function savePool(){
  const id=document.getElementById('poolId').value.trim();const name=document.getElementById('poolName').value.trim();const isEvent=document.getElementById('eventToggle').classList.contains('on');
  if(!id||!name){showToast('プールIDと名前は必須です','error');return;}
  const poolData={id,name,is_event:isEvent};
  let r;
  if(_editingPoolId){r=await sbFetch(`/rest/v1/gacha_pools?id=eq.${_editingPoolId}`,'PATCH',poolData);}else{r=await sbFetch('/rest/v1/gacha_pools','POST',poolData);}
  if(!r.ok){showToast(_editingPoolId?'更新に失敗しました':'追加に失敗しました','error');return;}
  showToast(_editingPoolId?'プールを更新しました':'プールを追加しました','success');closePoolModal();loadPools();
}

async function deletePool(id){if(!confirm(`プール「${id}」を削除しますか？\n紐付いているアイテム設定も削除されます。`)) return;const r=await sbFetch(`/rest/v1/gacha_pools?id=eq.${id}`,'DELETE');if(!r.ok){showToast('削除に失敗しました','error');return;}showToast('削除しました','success');loadPools();}

function updatePoolSelect(){
  const sel=document.getElementById('poolSelect');const cur=sel.value;sel.innerHTML='<option value="">— プールを選択 —</option>';_allPools.forEach(p=>{const opt=document.createElement('option');opt.value=p.id;opt.textContent=p.name+(p.is_event?' [イベント]':'');sel.appendChild(opt);});if(cur) sel.value=cur;
}

async function loadPoolItems(){
  const poolId=document.getElementById('poolSelect').value;const area=document.getElementById('poolItemsArea');if(!poolId){area.innerHTML='<div class="empty">プールを選択してください</div>';return;}area.innerHTML='<div class="loading"><span class="spinner"></span>読み込み中…</div>';const r=await sbFetch(`/rest/v1/gacha_pool_items?pool_id=eq.${poolId}&select=*`);if(!r.ok){area.innerHTML='<div class="empty">読み込みに失敗しました</div>';return;}const poolItems=r.data||[];renderPoolItems(poolId,poolItems);
}

function renderPoolItems(poolId,poolItems){
  const area=document.getElementById('poolItemsArea');const registeredIds=poolItems.map(x=>x.item_id);const unregistered=_allItems.filter(it=>!registeredIds.includes(it.id));
  let html=`<div class="section-header" style="margin-bottom:12px;"><div class="section-sub">アイテムの重みが高いほど排出されやすくなります</div></div><div class="tbl-wrap"><table><thead><tr><th>アイコン</th><th>アイテム名</th><th>レアリティ</th><th>排出重み</th><th>操作</th></tr></thead><tbody>`;
  if(!poolItems.length){html+=`<tr><td colspan="5"><div class="empty">アイテムが登録されていません</div></td></tr>`;}else{poolItems.forEach(pi=>{const it=_allItems.find(x=>x.id===pi.item_id)||{name:pi.item_id,icon:'?',rarity:'common'};html+=`<tr><td class="icon-cell">${it.icon||'🎁'}</td><td>${it.name}<br><code style="font-size:10px;color:var(--text3)">${pi.item_id}</code></td><td><span class="tag tag-${it.rarity}">${RARITY_LABELS[it.rarity]||it.rarity}</span></td><td><input class="weight-input" type="number" min="1" max="9999" value="${pi.weight}" onchange="updateWeight('${pi.id}',this.value)"></td><td><button class="btn btn-sm btn-danger" onclick="removePoolItem('${pi.id}')">削除</button></td></tr>`;});}
  html+=`</tbody></table></div>`;
  if(unregistered.length){html+=`<div class="pool-items-section"><div class="section-title" style="font-size:13px;margin-bottom:12px;">アイテムを追加</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;"><select class="input" id="addItemSelect" style="flex:1;max-width:320px;">`;unregistered.forEach(it=>{html+=`<option value="${it.id}">${it.icon||''} ${it.name} [${RARITY_LABELS[it.rarity]||it.rarity}]</option>`;});html+=`</select><input class="weight-input" type="number" id="addItemWeight" value="100" min="1" max="9999" style="width:80px;"><button class="btn btn-sm" onclick="addPoolItem('${poolId}')">追加</button></div></div>`;}
  area.innerHTML=html;
}

async function addPoolItem(poolId){const itemId=document.getElementById('addItemSelect').value;const weight=parseInt(document.getElementById('addItemWeight').value)||100;if(!itemId) return;const r=await sbFetch('/rest/v1/gacha_pool_items','POST',{pool_id:poolId,item_id:itemId,weight});if(!r.ok){showToast('追加に失敗しました','error');return;}showToast('追加しました','success');loadPoolItems();}

async function updateWeight(id,val){const weight=parseInt(val);if(!weight||weight<1) return;const r=await sbFetch(`/rest/v1/gacha_pool_items?id=eq.${id}`,'PATCH',{weight});if(!r.ok){showToast('更新に失敗しました','error');return;}showToast('重みを更新しました','success');}

async function removePoolItem(id){if(!confirm('このアイテムをプールから削除しますか？')) return;const r=await sbFetch(`/rest/v1/gacha_pool_items?id=eq.${id}`,'DELETE');if(!r.ok){showToast('削除に失敗しました','error');return;}showToast('削除しました','success');loadPoolItems();}

let _toastTimer=null;
function showToast(msg,type='success'){
  if(_toastTimer) clearTimeout(_toastTimer);let t=document.querySelector('.toast');if(!t){t=document.createElement('div');document.body.appendChild(t);}t.className=`toast ${type}`;t.textContent=msg;_toastTimer=setTimeout(()=>t.remove(),2800);
}

(async()=>{const ok=await _tryRestoreAdminSession();if(ok) showAdminApp();})();
</script>
</body>
</html>
